name: Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - '*'
    tags:
      - '*'

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        build_target: [ release ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Temporarily modify the rust toolchain version
        run: rustup override set stable
      - name: Output rust version
        run: rustup --version
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/checkout@v6
      - name: Run tests in "${{ matrix.build_target }}" mode
        run: cargo test --profile ${{ matrix.build_target }}
      - name: Build binaries in "${{ matrix.build_target }}" mode
        run: cargo build --profile ${{ matrix.build_target }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: usergen
          path: target/${{ matrix.build_target }}/usergen

  container:
    if: contains(github.ref, 'refs/tags/')
    needs: [ build ]
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        build_target: [ release ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: usergen
          path: target/${{ matrix.build_target }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: |
          ls -al target/${{ matrix.build_target }}
          chmod +x ./target/${{ matrix.build_target }}/usergen
          
          VERSION=$(echo '${{ github.ref }}' | sed -e 's/refs\/tags\///g' | sed -e 's/refs\/heads\///g')
          
          docker build \
            -t yo1000/dummy-user-generator:$VERSION \
            --build-arg BIN=./target/${{ matrix.build_target }}/usergen \
            --build-arg DATA_DIR=./data .
          docker image ls
          
          docker tag yo1000/dummy-user-generator:$VERSION ghcr.io/yo1000/dummy-user-generator:$VERSION
          docker tag yo1000/dummy-user-generator:$VERSION ghcr.io/yo1000/dummy-user-generator:latest
          
          docker push ghcr.io/yo1000/dummy-user-generator:$VERSION
          docker push ghcr.io/yo1000/dummy-user-generator:latest
